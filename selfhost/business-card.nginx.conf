# nginx configuration for Business Card (self-hosted)
# Place at /etc/nginx/sites-available/business-card and symlink from sites-enabled
# Test with: nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;

    # CHANGE ME: your domain
    server_name card.example.com;

    # --- Static SPA (Vite build output) ---
    # `bun run build` from the REPO ROOT produces:
    #   <repo>/dist/index.html
    #   <repo>/dist/assets/*.js,*.css
    #
    # CHANGE ME only if your repo is cloned somewhere other than /opt/connect-card.
    # Verify with: ls /opt/connect-card/dist/index.html
    root /opt/connect-card/dist;
    index index.html;

    # Gzip for static assets
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Cache hashed assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- Proxy to Express backend ---
    # Only /api and /uploads are backend-owned. Everything else (including
    # /card/:slug public pages) is served by the SPA fallback below.
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / WebSocket upgrade support (if you add realtime later)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Allow larger uploads (multipart goes through /api/uploads)
        client_max_body_size 10M;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- SPA fallback: every unknown path -> index.html ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
